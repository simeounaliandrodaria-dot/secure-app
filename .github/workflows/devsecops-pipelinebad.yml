name: DevSecOps Pipeline (Bad)

on:
  push:
    branches: [ bad ]
  pull_request:
    branches: [ bad ]

env:
  DOCKER_IMAGE_NAME: secure-app-bad

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Run Safety vulnerability scan
        run: |
          # This will fail due to the vulnerable 'requests' package
          safety check -r requirements.txt --full-report

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: dependency-scan
    # Continue even if dependency scan fails to show unit test failure
    if: always() && (needs.dependency-scan.result == 'success' || needs.dependency-scan.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          # This will fail due to the missing length check
          pytest tests/ -v --tb=short

  container-build-scan:
    name: Container Build & Scan
    runs-on: ubuntu-latest
    needs: unit-tests
    # Continue even if unit tests fail to show container scan findings
    if: always() && (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        # This will fail due to vulnerabilities in the old base image

  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: [dependency-scan, unit-tests, container-build-scan]
    if: always() && needs.dependency-scan.result == 'success' && needs.unit-tests.result == 'success' && needs.container-build-scan.result == 'success'
    steps:
      - name: Deploy
        run: echo "This step will be skipped because the pipeline fails."
