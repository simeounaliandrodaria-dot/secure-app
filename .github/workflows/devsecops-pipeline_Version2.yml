name: Advanced DevSecOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: secure-app

jobs:
  # ── Security Scans (parallelised for speed) ──
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml
          generateSarif: true
      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: semgrep.sarif

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose
      - name: Upload secret scan log
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-log
          path: gitleaks-report.json

  dependency-scan:
    name: Dependency Vulnerability Scan (Trivy – Filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Scan dependencies (including transitive)
        run: |
          trivy fs --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format json \
            --output trivy-fs-results.json \
            .

      - name: Upload dependency scan report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan
          path: trivy-fs-results.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run pytest with coverage
        run: |
          export PYTHONPATH=$PWD
          pytest tests/ --junitxml=test-results.xml -v
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ── Build & Attest (only if all scans & tests pass) ──
  build-and-attest:
    name: Build, Scan Container, Generate SBOM & Trust Attestation
    runs-on: ubuntu-latest
    needs: [sast, secret-scan, dependency-scan, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image (local only)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Container vulnerability scan
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 --format json \
            --output trivy-results.json \
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: cyclonedx-json
          artifact-name: sbom

      - name: Mark image as trusted (tag)
        run: |
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
                     ${{ env.DOCKER_IMAGE_NAME }}:trusted-${{ env.IMAGE_TAG }}

      - name: Export trusted image as artifact
        run: |
          docker save ${{ env.DOCKER_IMAGE_NAME }}:trusted-${{ env.IMAGE_TAG }} \
            -o trusted-image.tar

      - name: Create trust attestation document
        run: |
          cat <<EOF > trust-attestation.txt
          Trusted Build Attestation
          =========================
          Repository: ${{ github.repository }}
          Commit SHA: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Image: ${{ env.DOCKER_IMAGE_NAME }}:trusted-${{ env.IMAGE_TAG }}
          Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Checks passed:
            - SAST (Semgrep)
            - Secret detection (Gitleaks)
            - Dependency audit (pip-audit)
            - Unit tests
            - Container vulnerability scan (Trivy, 0 CRITICAL/HIGH)
          SBOM: attached (CycloneDX JSON)
          This artifact is promotable to production.
          EOF

      - name: Upload all build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build-artifacts
          path: |
            trivy-results.json
            trust-attestation.txt
            trusted-image.tar

  # ── Deploy Simulation (just for demonstration) ──
  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: build-and-attest
    steps:
      - name: Simulate production rollout
        run: |
          echo "Deploying trusted image ${{ env.DOCKER_IMAGE_NAME }}:trusted-${{ github.sha }}..."
          echo "All gating checks passed. Release complete."
