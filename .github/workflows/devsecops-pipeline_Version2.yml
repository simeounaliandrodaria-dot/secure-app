name: DevSecOps Pipeline (Good)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE_NAME: secure-app

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run vulnerability scan on dependencies
        run: |
          pip-audit -r requirements.txt

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          export PYTHONPATH=$PWD
          pytest tests/ -v --tb=short

  container-build-scan:
    name: Container Build & Scan
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan container image with Trivy
        run: |
          trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 --format table ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: container-build-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "🚀 Deploying application..."
          echo "✅ Deployment successful!"
          echo "📊 Pipeline Summary:"
          echo "   - Dependency scan: PASSED"
          echo "   - Unit tests: PASSED"
          echo "   - Container scan: PASSED"
          echo "   - Application deployed successfully"
