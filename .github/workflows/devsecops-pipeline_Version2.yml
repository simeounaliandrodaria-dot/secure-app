name: devsecops-pipeline_Version2.yml

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Updated from 3.7 (EOL)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dependency vulnerability scan
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt # Changed from 'requirements' to 'inputs'

  unit-tests:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover tests

  container-build-and-scan:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-app:latest .

      - name: Scan Docker image for vulnerabilities with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:latest'
          format: 'table'
          exit-code: '1'

  deploy:
    runs-on: ubuntu-latest
    needs: container-build-and-scan
    steps:
      - name: Deploy (should not run if previous failed)
        run: echo "Deployed!"
