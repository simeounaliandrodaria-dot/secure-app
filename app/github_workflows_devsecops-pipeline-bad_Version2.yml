name: DevSecOps Pipeline (bad example)

on:
  push:
    branches: [bad-example]
  pull_request:

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.7'
      - name: Install dependencies
        run: pip install -r requirements_bad.txt
      - name: Run dependency vulnerability scan
        uses: pypa/gh-action-pip-audit@v1
        with:
          requirements: requirements_bad.txt

  unit-tests:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.7'
      - name: Install dependencies
        run: pip install -r requirements_bad.txt
      - name: Run unit tests
        run: python -m unittest discover tests

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Dockerfile_bad -t insecure-app:latest .

  container-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Dockerfile_bad -t insecure-app:latest .
      - name: Scan Docker image for vulnerabilities with Trivy
        uses: aquasecurity/trivy-action@0.16.0
        with:
          image-ref: 'insecure-app:latest'
          format: 'table'
          exit-code: '1'

  deploy:
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - name: Deploy (should not run if previous failed)
        run: echo "Deployed!"